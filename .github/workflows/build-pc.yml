name: Build PC Version

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Unity
      uses: game-ci/unity-builder@v4
      with:
        unityVersion: 2021.3.16f1  # Adjust to your Unity version
        targetPlatform: StandaloneWindows64
        buildMethod: BuildScript.Build
        projectPath: cf1.1.1/PC

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PC-Build
        path: build/StandaloneWindows64/